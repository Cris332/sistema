<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Controle de Serviços</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/app.js"></script>
    <script src="js/config.js"></script>
    <script src="js/navegacao.js"></script>
    <style>
        :root {
            --background-color: #f0f0f0;
            --text-color: #333;
            --primary-color: #6699cc;
            --secondary-color: #3366cc;
            --content-bg: #3366cc;
            --form-bg: #e6e6e6;
            --option-bg: #f9f9f9;
            --border-color: #ddd;
            --font-size-base: 16px;
            --font-size-large: 18px;
            --contrast-text: #000;
            --contrast-bg: #fff;
            --success-color: #5cb85c;
            --warning-color: #f0ad4e;
        }
        
        .dark-theme {
            --background-color: #222;
            --text-color: #f0f0f0;
            --primary-color: #4477aa;
            --secondary-color: #2244aa;
            --content-bg: #1a1a2e;
            --form-bg: #333;
            --option-bg: #444;
            --border-color: #555;
            --contrast-text: #fff;
            --contrast-bg: #000;
        }
        
        .high-contrast {
            --background-color: #000;
            --text-color: #fff;
            --primary-color: #fff;
            --secondary-color: #fff;
            --content-bg: #000;
            --form-bg: #000;
            --option-bg: #000;
            --border-color: #fff;
            --contrast-text: #fff;
            --contrast-bg: #000;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        /* Estilos para a tela de pesquisa */
        .search-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .search-container {
            background-color: var(--form-bg);
            width: 90%;
            max-width: 1000px;
            border-radius: 5px;
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .search-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .search-title {
            font-size: 1.5rem;
            color: var(--text-color);
        }
        
        .close-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .search-form {
            margin-bottom: 20px;
        }
        
        .search-criteria {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .search-field {
            flex: 1;
            min-width: 200px;
        }
        
        .search-field label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .search-field input, .search-field select {
            width: 100%;
            padding: 8px;
            border: 1px solid #aaa;
            border-radius: 3px;
        }
        
        .search-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        
        .search-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .clear-btn {
            background-color: #ddd;
            color: #333;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .results-container {
            margin-top: 20px;
        }
        
        #results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        #results-table th, #results-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        
        .action-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .action-btn:hover {
            background-color: var(--secondary-color);
        }
        
        .edit-btn {
            background-color: #6699cc;
        }
        
        .print-btn {
            background-color: #5cb85c;
        }
        
        body {
            background-color: var(--background-color);
            color: var(--text-color);
            font-size: var(--font-size-base);
            transition: background-color 0.3s, color 0.3s, font-size 0.3s;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 0;
            text-align: center;
            border-radius: 5px;
        }
        
        nav {
            background-color: var(--form-bg);
            padding: 10px 0;
            margin: 20px 0;
            border-radius: 5px;
        }
        
        nav ul {
            list-style-type: none;
            display: flex;
            justify-content: center;
        }
        
        nav ul li {
            margin: 0 15px;
        }
        
        nav ul li a {
            text-decoration: none;
            color: var(--text-color);
            padding: 5px 10px;
            border-radius: 3px;
            transition: background-color 0.3s;
        }
        
        nav ul li a:hover {
            background-color: var(--primary-color);
            color: white;
        }
        
        .content {
            background-color: var(--content-bg);
            padding: 20px;
            margin-top: 20px;
            border-radius: 5px;
        }
        
        .form-container {
            background-color: var(--form-bg);
            padding: 20px;
            border-radius: 5px;
        }
        
        .form-title {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        
        .form-group label {
            width: 120px;
            text-align: right;
            margin-right: 10px;
        }
        
        .form-group input {
            flex: 1;
            padding: 8px;
            border: 1px solid #aaa;
            border-radius: 3px;
        }
        
        .required::before {
            content: "*";
            color: red;
        }
        
        .buttons {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            background-color: #ddd;
        }
        
        .btn i {
            font-size: 18px;
            color: #333;
        }
        
        .btn:hover i {
            color: #3366cc;
        }
        
        .btn img {
            width: 24px;
            height: 24px;
        }
        
        .required-info {
            text-align: right;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            .form-group {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .form-group label {
                width: 100%;
                text-align: left;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <!-- Tela de pesquisa (modal) -->
    <div class="search-screen" id="search-screen">
        <div class="search-container">
            <div class="search-header">
                <h2 class="search-title">Pesquisa de Ordens de Serviço</h2>
                <button class="close-btn" id="close-search-btn">&times;</button>
            </div>
            
            <div class="search-form">
                <div class="search-criteria">
                    <div class="search-field">
                        <label for="search-numero-os">Número OS</label>
                        <input type="text" id="search-numero-os" placeholder="Digite o número da OS">
                    </div>
                    
                    <div class="search-field">
                        <label for="search-cliente">Cliente</label>
                        <input type="text" id="search-cliente" placeholder="Nome ou ID do cliente">
                    </div>
                    
                    <!-- Campos ocultos mas mantidos para compatibilidade com o código existente -->
                    <div class="search-field" style="display: none;">
                        <label for="search-data-abertura">Data de Abertura</label>
                        <input type="date" id="search-data-abertura">
                    </div>
                    
                    <div class="search-field" style="display: none;">
                        <label for="search-equipamento">Equipamento</label>
                        <input type="text" id="search-equipamento" placeholder="Tipo de equipamento">
                    </div>
                </div>
                
                <div class="search-buttons">
                    <button type="button" class="search-btn" id="btn-executar-pesquisa">Pesquisar</button>
                    <button type="button" class="clear-btn" id="btn-limpar-pesquisa">Limpar</button>
                </div>
            </div>
            
            <div class="results-container">
                <h3>Resultados da Pesquisa</h3>
                <table id="results-table">
                    <thead>
                        <tr>
                            <th>Número OS</th>
                            <th>Data</th>
                            <th>Cliente</th>
                            <th>Equipamento</th>
                            <th>Valor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="results-body">
                        <!-- Os resultados serão inseridos aqui via JavaScript -->
                    </tbody>
                </table>
                <div id="no-results-message" style="display: none;">Nenhum resultado encontrado.</div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <header>
            <h1>Sistema de Controle de Serviços</h1>
        </header>
        
        <nav>
            <ul>
                <li><a href="index.html">Ordem de Serviço</a></li>
                <li><a href="relatorio.html">Relatórios</a></li>
                <li><a href="entregas.html">Entregas</a></li>
                <li><a href="ajuda.html">Ajuda</a></li>
                <li><a href="opcoes.html">Opções</a></li>
            </ul>
        </nav>
        
        <div class="content">
            <div class="form-container" id="os-form-container">
                <h2 class="form-title">Ordem de Serviços</h2>
                
                <div class="required-info">*Campos Obrigatórios</div>
                
                <form id="os-form">
                    <div class="form-group">
                        <label for="numero-os" class="required">Número OS</label>
                        <input type="text" id="numero-os" name="numero-os" required>
                        
                        <label for="data" class="required" style="margin-left: 20px;">Data</label>
                        <input type="date" id="data" name="data" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="equipamento" class="required">Equipamento</label>
                        <input type="text" id="equipamento" name="equipamento" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="defeito" class="required">Defeito</label>
                        <input type="text" id="defeito" name="defeito" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="servico">Serviço</label>
                        <input type="text" id="servico" name="servico">
                    </div>
                    
                    <div class="form-group">
                        <label for="tecnico">Técnico</label>
                        <input type="text" id="tecnico" name="tecnico">
                        
                        <label for="valor-total" style="margin-left: 20px;">Valor total</label>
                        <input type="number" id="valor-total" name="valor-total" step="0.01">
                    </div>
                    
                    <div class="form-group">
                        <label for="id-cliente" class="required">Id Cliente</label>
                        <input type="text" id="id-cliente" name="id-cliente" required>
                        
                        <label for="cliente" style="margin-left: 20px;">Cliente</label>
                        <input type="text" id="cliente" name="cliente">
                    </div>
                    
                    <div class="buttons">
                        <button type="button" class="btn" id="btn-novo" title="Novo">
                            <i class="fas fa-file"></i>
                        </button>
                        <button type="button" class="btn" id="btn-salvar" title="Salvar">
                            <i class="fas fa-save"></i>
                        </button>
                        <button type="button" class="btn" id="btn-pesquisar" title="Pesquisar">
                            <i class="fas fa-search"></i>
                        </button>
                        <button type="button" class="btn" id="btn-excluir" title="Excluir">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                        <button type="button" class="btn" id="btn-imprimir" title="Imprimir">
                            <i class="fas fa-print"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
