<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="1600" xmlns="http://www.w3.org/2000/svg">
    <!-- Estilos do diagrama -->
    <style>
        .titulo { font: bold 24px Arial; fill: #333; }
        .subtitulo { font: bold 20px Arial; fill: #444; }
        .requisito { font: 16px Arial; fill: #333; }
        .requisito-titulo { font: bold 18px Arial; fill: #333; }
        .box { fill: #f0f8ff; stroke: #6699cc; stroke-width: 2; }
        .box-nf { fill: #fff0f5; stroke: #cc6699; stroke-width: 2; }
        .linha { stroke: #999; stroke-width: 1; }
    </style>
    
    <!-- Título do diagrama -->
    <text x="600" y="40" text-anchor="middle" class="titulo">Diagrama de Requisitos - Sistema de Controle de Serviços Técnicos</text>
    
    <!-- Requisitos Funcionais -->
    <rect x="50" y="70" width="500" height="1450" rx="10" ry="10" class="box" opacity="0.7"/>
    <text x="300" y="100" text-anchor="middle" class="subtitulo">Requisitos Funcionais</text>
    
    <!-- RF1: Gestão de Usuários -->
    <rect x="70" y="120" width="460" height="180" rx="5" ry="5" class="box"/>
    <text x="300" y="145" text-anchor="middle" class="requisito-titulo">RF1: Gestão de Usuários</text>
    <text x="90" y="175" class="requisito">RF1.1: Cadastrar usuários com nome, email e senha</text>
    <text x="90" y="200" class="requisito">RF1.2: Definir nível de acesso (admin ou usuário)</text>
    <text x="90" y="225" class="requisito">RF1.3: Autenticar usuários no sistema</text>
    <text x="90" y="250" class="requisito">RF1.4: Gerenciar permissões baseadas no nível de acesso</text>
    <text x="90" y="275" class="requisito">RF1.5: Registrar data de cadastro automaticamente</text>
    
    <!-- RF2: Gestão de Cargos -->
    <rect x="70" y="320" width="460" height="130" rx="5" ry="5" class="box"/>
    <text x="300" y="345" text-anchor="middle" class="requisito-titulo">RF2: Gestão de Cargos</text>
    <text x="90" y="375" class="requisito">RF2.1: Cadastrar cargos com nome e descrição</text>
    <text x="90" y="400" class="requisito">RF2.2: Consultar cargos disponíveis</text>
    <text x="90" y="425" class="requisito">RF2.3: Atualizar informações de cargos</text>
    
    <!-- RF3: Gestão de Colaboradores -->
    <rect x="70" y="470" width="460" height="180" rx="5" ry="5" class="box"/>
    <text x="300" y="495" text-anchor="middle" class="requisito-titulo">RF3: Gestão de Colaboradores</text>
    <text x="90" y="525" class="requisito">RF3.1: Cadastrar colaboradores com dados pessoais</text>
    <text x="90" y="550" class="requisito">RF3.2: Associar colaborador a um cargo</text>
    <text x="90" y="575" class="requisito">RF3.3: Vincular colaborador a um usuário do sistema</text>
    <text x="90" y="600" class="requisito">RF3.4: Consultar colaboradores cadastrados</text>
    <text x="90" y="625" class="requisito">RF3.5: Atualizar informações de colaboradores</text>
    
    <!-- RF4: Gestão de Clientes -->
    <rect x="70" y="670" width="460" height="180" rx="5" ry="5" class="box"/>
    <text x="300" y="695" text-anchor="middle" class="requisito-titulo">RF4: Gestão de Clientes</text>
    <text x="90" y="725" class="requisito">RF4.1: Cadastrar clientes (pessoa física ou jurídica)</text>
    <text x="90" y="750" class="requisito">RF4.2: Registrar dados de contato (telefone, email)</text>
    <text x="90" y="775" class="requisito">RF4.3: Armazenar endereço do cliente</text>
    <text x="90" y="800" class="requisito">RF4.4: Consultar clientes cadastrados</text>
    <text x="90" y="825" class="requisito">RF4.5: Atualizar informações de clientes</text>
    
    <!-- RF5: Gestão de Ordens de Serviço -->
    <rect x="70" y="870" width="460" height="280" rx="5" ry="5" class="box"/>
    <text x="300" y="895" text-anchor="middle" class="requisito-titulo">RF5: Gestão de Ordens de Serviço</text>
    <text x="90" y="925" class="requisito">RF5.1: Criar nova ordem de serviço</text>
    <text x="90" y="950" class="requisito">RF5.2: Gerar número de OS automaticamente</text>
    <text x="90" y="975" class="requisito">RF5.3: Registrar equipamento e defeito relatado</text>
    <text x="90" y="1000" class="requisito">RF5.4: Vincular OS a um cliente</text>
    <text x="90" y="1025" class="requisito">RF5.5: Atribuir técnico responsável</text>
    <text x="90" y="1050" class="requisito">RF5.6: Registrar serviço realizado</text>
    <text x="90" y="1075" class="requisito">RF5.7: Calcular valor total do serviço</text>
    <text x="90" y="1100" class="requisito">RF5.8: Atualizar status da OS (aberta, em andamento, concluída)</text>
    <text x="90" y="1125" class="requisito">RF5.9: Consultar ordens de serviço</text>
    
    <!-- RF6: Relatórios -->
    <rect x="70" y="1170" width="460" height="180" rx="5" ry="5" class="box"/>
    <text x="300" y="1195" text-anchor="middle" class="requisito-titulo">RF6: Relatórios</text>
    <text x="90" y="1225" class="requisito">RF6.1: Gerar relatório de ordens de serviço</text>
    <text x="90" y="1250" class="requisito">RF6.2: Gerar relatório de clientes</text>
    <text x="90" y="1275" class="requisito">RF6.3: Gerar relatório de colaboradores</text>
    <text x="90" y="1300" class="requisito">RF6.4: Gerar relatório de cargos</text>
    <text x="90" y="1325" class="requisito">RF6.5: Gerar relatório de usuários</text>
    
    <!-- RF7: Impressão -->
    <rect x="70" y="1370" width="460" height="130" rx="5" ry="5" class="box"/>
    <text x="300" y="1395" text-anchor="middle" class="requisito-titulo">RF7: Impressão</text>
    <text x="90" y="1425" class="requisito">RF7.1: Imprimir ordem de serviço</text>
    <text x="90" y="1450" class="requisito">RF7.2: Imprimir relatórios gerados</text>
    <text x="90" y="1475" class="requisito">RF7.3: Visualizar prévia de impressão</text>
    
    <!-- Requisitos Não Funcionais -->
    <rect x="650" y="70" width="500" height="1000" rx="10" ry="10" class="box-nf" opacity="0.7"/>
    <text x="900" y="100" text-anchor="middle" class="subtitulo">Requisitos Não Funcionais</text>
    
    <!-- RNF1: Segurança -->
    <rect x="670" y="120" width="460" height="180" rx="5" ry="5" class="box-nf"/>
    <text x="900" y="145" text-anchor="middle" class="requisito-titulo">RNF1: Segurança</text>
    <text x="690" y="175" class="requisito">RNF1.1: Armazenar senhas criptografadas</text>
    <text x="690" y="200" class="requisito">RNF1.2: Controle de acesso baseado em níveis de usuário</text>
    <text x="690" y="225" class="requisito">RNF1.3: Validação de dados nos formulários</text>
    <text x="690" y="250" class="requisito">RNF1.4: Proteção contra injeção SQL</text>
    <text x="690" y="275" class="requisito">RNF1.5: Sanitização de dados de entrada</text>
    
    <!-- RNF2: Usabilidade -->
    <rect x="670" y="320" width="460" height="180" rx="5" ry="5" class="box-nf"/>
    <text x="900" y="345" text-anchor="middle" class="requisito-titulo">RNF2: Usabilidade</text>
    <text x="690" y="375" class="requisito">RNF2.1: Interface intuitiva e responsiva</text>
    <text x="690" y="400" class="requisito">RNF2.2: Feedback visual para ações do usuário</text>
    <text x="690" y="425" class="requisito">RNF2.3: Mensagens de erro claras e informativas</text>
    <text x="690" y="450" class="requisito">RNF2.4: Atalhos para funções frequentes</text>
    <text x="690" y="475" class="requisito">RNF2.5: Layout consistente em todas as telas</text>
    
    <!-- RNF3: Desempenho -->
    <rect x="670" y="520" width="460" height="130" rx="5" ry="5" class="box-nf"/>
    <text x="900" y="545" text-anchor="middle" class="requisito-titulo">RNF3: Desempenho</text>
    <text x="690" y="575" class="requisito">RNF3.1: Tempo de resposta rápido para consultas</text>
    <text x="690" y="600" class="requisito">RNF3.2: Otimização de consultas ao banco de dados</text>
    <text x="690" y="625" class="requisito">RNF3.3: Carregamento eficiente de páginas</text>
    
    <!-- RNF4: Confiabilidade -->
    <rect x="670" y="670" width="460" height="130" rx="5" ry="5" class="box-nf"/>
    <text x="900" y="695" text-anchor="middle" class="requisito-titulo">RNF4: Confiabilidade</text>
    <text x="690" y="725" class="requisito">RNF4.1: Tratamento adequado de exceções</text>
    <text x="690" y="750" class="requisito">RNF4.2: Backup automático do banco de dados</text>
    <text x="690" y="775" class="requisito">RNF4.3: Recuperação de falhas</text>
    
    <!-- RNF5: Manutenibilidade -->
    <rect x="670" y="820" width="460" height="130" rx="5" ry="5" class="box-nf"/>
    <text x="900" y="845" text-anchor="middle" class="requisito-titulo">RNF5: Manutenibilidade</text>
    <text x="690" y="875" class="requisito">RNF5.1: Código organizado e documentado</text>
    <text x="690" y="900" class="requisito">RNF5.2: Arquitetura modular (classes separadas)</text>
    <text x="690" y="925" class="requisito">RNF5.3: Padrões de codificação consistentes</text>
    
    <!-- RNF6: Compatibilidade -->
    <rect x="670" y="970" width="460" height="80" rx="5" ry="5" class="box-nf"/>
    <text x="900" y="995" text-anchor="middle" class="requisito-titulo">RNF6: Compatibilidade</text>
    <text x="690" y="1025" class="requisito">RNF6.1: Compatibilidade com navegadores modernos</text>
    
    <!-- Legenda -->
    <rect x="650" y="1090" width="500" height="100" rx="5" ry="5" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
    <text x="900" y="1115" text-anchor="middle" class="requisito-titulo">Legenda</text>
    <rect x="670" y="1135" width="20" height="20" class="box"/>
    <text x="700" y="1150" class="requisito">Requisito Funcional</text>
    <rect x="850" y="1135" width="20" height="20" class="box-nf"/>
    <text x="880" y="1150" class="requisito">Requisito Não Funcional</text>
</svg>