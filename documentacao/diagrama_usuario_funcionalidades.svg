<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1000" height="800" xmlns="http://www.w3.org/2000/svg">
    <!-- Estilos do diagrama -->
    <style>
        .titulo { font: bold 24px Arial; fill: #333; }
        .subtitulo { font: bold 18px Arial; fill: #444; }
        .texto { font: 14px Arial; fill: #333; }
        .texto-bold { font: bold 14px Arial; fill: #333; }
        .circulo-usuario { fill: #4e73df; stroke: #3a56c5; stroke-width: 2; }
        .retangulo-funcao { fill: #36b9cc; stroke: #2a8c9c; stroke-width: 2; rx: 10; ry: 10; }
        .hexagono-admin { fill: #1cc88a; stroke: #169a6c; stroke-width: 2; }
        .triangulo-alerta { fill: #f6c23e; stroke: #dda20a; stroke-width: 2; }
        .diamante-processo { fill: #e74a3b; stroke: #c5392c; stroke-width: 2; }
        .linha { stroke: #858796; stroke-width: 2; }
        .linha-tracejada { stroke: #858796; stroke-width: 2; stroke-dasharray: 5,5; }
    </style>
    
    <!-- Título do diagrama -->
    <text x="500" y="40" text-anchor="middle" class="titulo">Diagrama de Funcionalidades do Usuário</text>
    <text x="500" y="70" text-anchor="middle" class="subtitulo">Sistema de Controle de Serviços Técnicos</text>
    
    <!-- Círculo central - Usuário -->
    <circle cx="500" cy="250" r="80" class="circulo-usuario"/>
    <text x="500" y="240" text-anchor="middle" fill="white" font-size="24" font-weight="bold">USUÁRIO</text>
    <text x="500" y="265" text-anchor="middle" fill="white" font-size="14">Entidade Principal</text>
    
    <!-- Funcionalidades do Usuário (retângulos) -->
    <!-- Cadastro -->
    <rect x="150" y="200" width="180" height="60" class="retangulo-funcao"/>
    <text x="240" y="235" text-anchor="middle" fill="white" class="texto-bold">CADASTRO</text>
    <line x1="230" y1="200" x2="420" y2="250" class="linha"/>
    
    <!-- Funcionalidades de Cadastro (pequenos retângulos) -->
    <rect x="50" y="100" width="140" height="40" class="retangulo-funcao" opacity="0.9"/>
    <text x="120" y="125" text-anchor="middle" fill="white" class="texto">Nome Completo</text>
    <line x1="150" y1="140" x2="180" y2="200" class="linha-tracejada"/>
    
    <rect x="50" y="150" width="140" height="40" class="retangulo-funcao" opacity="0.9"/>
    <text x="120" y="175" text-anchor="middle" fill="white" class="texto">Email</text>
    <line x1="150" y1="170" x2="180" y2="200" class="linha-tracejada"/>
    
    <rect x="50" y="200" width="140" height="40" class="retangulo-funcao" opacity="0.9"/>
    <text x="120" y="225" text-anchor="middle" fill="white" class="texto">Senha</text>
    <line x1="150" y1="220" x2="180" y2="220" class="linha-tracejada"/>
    
    <rect x="50" y="250" width="140" height="40" class="retangulo-funcao" opacity="0.9"/>
    <text x="120" y="275" text-anchor="middle" fill="white" class="texto">Telefone</text>
    <line x1="150" y1="270" x2="180" y2="240" class="linha-tracejada"/>
    
    <rect x="50" y="300" width="140" height="40" class="retangulo-funcao" opacity="0.9"/>
    <text x="120" y="325" text-anchor="middle" fill="white" class="texto">Cargo</text>
    <line x1="150" y1="320" x2="180" y2="240" class="linha-tracejada"/>
    
    <!-- Nível de Acesso (hexágono) -->
    <polygon points="670,200 730,170 790,200 790,260 730,290 670,260" class="hexagono-admin"/>
    <text x="730" y="235" text-anchor="middle" fill="white" class="texto-bold">NÍVEL DE ACESSO</text>
    <line x1="580" y1="250" x2="670" y2="230" class="linha"/>
    
    <!-- Tipos de Acesso (pequenos hexágonos) -->
    <polygon points="850,150 890,130 930,150 930,190 890,210 850,190" class="hexagono-admin" opacity="0.9"/>
    <text x="890" y="175" text-anchor="middle" fill="white" class="texto">Administrador</text>
    <line x1="790" y1="200" x2="850" y2="170" class="linha-tracejada"/>
    
    <polygon points="850,230 890,210 930,230 930,270 890,290 850,270" class="hexagono-admin" opacity="0.9"/>
    <text x="890" y="255" text-anchor="middle" fill="white" class="texto">Técnico</text>
    <line x1="790" y1="230" x2="850" y2="250" class="linha-tracejada"/>
    
    <polygon points="850,310 890,290 930,310 930,350 890,370 850,350" class="hexagono-admin" opacity="0.9"/>
    <text x="890" y="335" text-anchor="middle" fill="white" class="texto">Atendente</text>
    <line x1="790" y1="260" x2="850" y2="330" class="linha-tracejada"/>
    
    <!-- Permissões (triângulos) -->
    <polygon points="500,400 450,480 550,480" class="triangulo-alerta"/>
    <text x="500" y="450" text-anchor="middle" fill="white" class="texto-bold">PERMISSÕES</text>
    <line x1="500" y1="330" x2="500" y2="400" class="linha"/>
    
    <!-- Tipos de Permissões (pequenos triângulos) -->
    <polygon points="350,500 320,550 380,550" class="triangulo-alerta" opacity="0.9"/>
    <text x="350" y="535" text-anchor="middle" fill="white" class="texto">Visualizar</text>
    <line x1="450" y1="480" x2="380" y2="525" class="linha-tracejada"/>
    
    <polygon points="500,500 470,550 530,550" class="triangulo-alerta" opacity="0.9"/>
    <text x="500" y="535" text-anchor="middle" fill="white" class="texto">Editar</text>
    <line x1="500" y1="480" x2="500" y2="500" class="linha-tracejada"/>
    
    <polygon points="650,500 620,550 680,550" class="triangulo-alerta" opacity="0.9"/>
    <text x="650" y="535" text-anchor="middle" fill="white" class="texto">Excluir</text>
    <line x1="550" y1="480" x2="620" y2="525" class="linha-tracejada"/>
    
    <!-- Processos (diamantes) -->
    <polygon points="300,350 250,400 300,450 350,400" class="diamante-processo"/>
    <text x="300" y="410" text-anchor="middle" fill="white" class="texto-bold">PROCESSOS</text>
    <line x1="420" y1="300" x2="320" y2="370" class="linha"/>
    
    <!-- Tipos de Processos (pequenos diamantes) -->
    <polygon points="180,400 150,430 180,460 210,430" class="diamante-processo" opacity="0.9"/>
    <text x="180" y="440" text-anchor="middle" fill="white" class="texto">Criar OS</text>
    <line x1="250" y1="400" x2="210" y2="430" class="linha-tracejada"/>
    
    <polygon points="180,480 150,510 180,540 210,510" class="diamante-processo" opacity="0.9"/>
    <text x="180" y="520" text-anchor="middle" fill="white" class="texto">Atualizar OS</text>
    <line x1="270" y1="430" x2="210" y2="510" class="linha-tracejada"/>
    
    <polygon points="180,560 150,590 180,620 210,590" class="diamante-processo" opacity="0.9"/>
    <text x="180" y="600" text-anchor="middle" fill="white" class="texto">Gerar Relatório</text>
    <line x1="290" y1="450" x2="210" y2="590" class="linha-tracejada"/>
    
    <!-- Legenda -->
    <rect x="50" y="650" width="900" height="120" fill="#f8f9fc" stroke="#dddfeb" stroke-width="1" rx="5" ry="5"/>
    <text x="500" y="675" text-anchor="middle" class="subtitulo">Legenda</text>
    
    <!-- Legenda: Círculo -->
    <circle cx="100" cy="700" r="15" class="circulo-usuario"/>
    <text x="130" y="705" class="texto">Usuário (Entidade Principal)</text>
    
    <!-- Legenda: Retângulo -->
    <rect x="200" y="685" width="30" height="30" class="retangulo-funcao"/>
    <text x="280" y="705" class="texto">Funcionalidade de Cadastro</text>
    
    <!-- Legenda: Hexágono -->
    <polygon points="350,700 365,685 380,700 380,715 365,730 350,715" class="hexagono-admin"/>
    <text x="430" y="705" class="texto">Nível de Acesso</text>
    
    <!-- Legenda: Triângulo -->
    <polygon points="500,700 485,725 515,725" class="triangulo-alerta"/>
    <text x="550" y="705" class="texto">Permissões</text>
    
    <!-- Legenda: Diamante -->
    <polygon points="620,700 605,715 620,730 635,715" class="diamante-processo"/>
    <text x="670" y="705" class="texto">Processos</text>
    
    <!-- Legenda: Linhas -->
    <line x1="720" y1="700" x2="750" y2="700" class="linha"/>
    <text x="790" y="705" class="texto">Conexão Direta</text>
    
    <line x1="720" y1="730" x2="750" y2="730" class="linha-tracejada"/>
    <text x="800" y="735" class="texto">Conexão Secundária</text>
</svg>